import os
import json
import requests
import gspread
from oauth2client.service_account import ServiceAccountCredentials
from datetime import datetime
import pytz

def run_sauger():
    tz = pytz.timezone('Europe/Berlin')
    zeit_jetzt = datetime.now(tz).strftime("%d.%m.%Y %H:%M")
    
    tk_key = os.environ.get("TANKERKOENIG_API_KEY")
    gcp_json = os.environ.get("GCP_SERVICE_ACCOUNT")
    
    # API Abfrage
    url = f"https://creativecommons.tankerkoenig.de/json/list.php?lat=54.516&lng=9.565&rad=5&sort=price&type=e5&apikey={tk_key}"
    
    try:
        # 1. Google Sheets Verbindung aufbauen (wir brauchen sie gleich zum Nachgucken)
        creds_dict = json.loads(gcp_json)
        scope = ["https://spreadsheets.google.com/feeds", "https://www.googleapis.com/auth/drive"]
        creds = ServiceAccountCredentials.from_json_keyfile_dict(creds_dict, scope)
        client = gspread.authorize(creds)
        sheet = client.open("Tankprotokoll").sheet1

        # 2. Tankerkönig abfragen
        response = requests.get(url)
        data = response.json()
        
        final_preis = None
        station_name = "Unbekannt"

        if data.get("ok") and len(data.get("stations", [])) > 0:
            station_data = data["stations"][0]
            final_preis = station_data.get("price")
            station_name = station_data.get("name")

        # 3. Sicherheits-Check: Wenn Preis leer oder 0 (typisch für Automaten nachts)
        if not final_preis or final_preis == 0:
            print("Kein aktueller Preis. Hole letzten Wert aus dem Sheet...")
            all_values = sheet.get_all_values()
            if len(all_values) > 1: # Wenn schon Daten drin sind
                # Nimm den Preis aus der letzten Zeile (Spalte D ist Index 3)
                final_preis = all_values[-1][3]
                print(f"Nutze alten Preis: {final_preis}")
            else:
                final_preis = "Warten..."

        # 4. In Google Sheets schreiben
        zeile = [zeit_jetzt, "24837", "e5", final_preis, "", "", "🤖 Auto-Sauger", station_name]
        sheet.append_row(zeile)
        print(f"Erfolg: {final_preis} für {station_name} eingetragen.")

    except Exception as e:
        print(f"Fehler im Ablauf: {e}")

if __name__ == "__main__":
    run_sauger()
