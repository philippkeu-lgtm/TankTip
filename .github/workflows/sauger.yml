name: Automatischer Tank-Sauger

on:
  schedule:
    - cron: '0 * * * *' # Läuft jede Stunde zur vollen Stunde
  workflow_dispatch: # Das ist der Schalter für den "Run workflow" Button

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Bibliotheken installieren
        # Wir installieren pytz direkt mit, damit die Uhrzeit im Sheet stimmt
        run: pip install requests gspread oauth2client pytz
        
      - name: Sauger starten
        env:
          TANKERKOENIG_API_KEY: ${{ secrets.TANKERKOENIG_API_KEY }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
        run: python sauger.py
