name: Automatischer Tank-Sauger

on:
  schedule:
    # Startet um 7 Minuten nach der vollen Stunde
    - cron: '7 * * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Bibliotheken installieren
        # Hier ist paxml jetzt mit auf der Liste!
        run: |
          pip install requests gspread oauth2client pytz
          pip install timesfm huggingface_hub jax[cpu] paxml
          
      - name: Sauger & KI starten
        env:
          TANKERKOENIG_API_KEY: ${{ secrets.TANKERKOENIG_API_KEY }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
        run: |
          python sauger.py
          python predictor.py
